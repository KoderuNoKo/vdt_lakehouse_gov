services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT_LOCAL}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres/:/docker-entrypoint-initdb.d/

  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: minio
    command: server /data --console-address ":9001" --license /minio.license
    environment:
      MINIO_ROOT_USER: ${LH_USER}
      MINIO_ROOT_PASSWORD: ${LH_PASSWORD}
    ports:
      - "${LH_PORT_LOCAL_API}:9000"
      - "${LH_PORT_LOCAL_WEB}:9001"
    volumes:
      - minio-data:/data
      - ./docker/minio/minio.license:/minio.license

  spark-master:
    build:
      context: ./docker/spark
    container_name: spark-master
    env_file: .env
    # start spark as master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080" # master web ui
      - "7077:7077" # worker-master connection
    volumes:
      - spark-data:/opt/spark/data
      - ./src/spark_jobs:/opt/spark/jobs
      - ./data:/opt/spark/data/csv

  spark-worker:
    build:
      context: ./docker/spark
    container_name: spark-worker
    env_file: .env
    # start spark as worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "8081:8081" # worker web ui
    volumes:
      - spark-data:/opt/spark/data
      - ./src/spark_jobs:/opt/spark/jobs
      - ./data:/opt/spark/data/csv

